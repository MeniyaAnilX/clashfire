<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLASH FIRE - Mission Verified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #07070c; padding: 15px;">

    <div id="verify-card" style="max-width: 400px; width: 100%; text-align: center; background: rgba(18, 20, 32, 0.95); border: 1.5px solid #00f2fe; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0, 242, 254, 0.25);">
        
        <div id="status-icon" style="font-size: 3.5rem; color: #ffd700; margin-bottom: 10px;">
            <i class="fa-solid fa-trophy"></i>
        </div>

        <h1 id="status-title" style="font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 5px;">
            MISSION <span style="color: #00e676;">VERIFIED!</span>
        </h1>

        <p id="status-desc" style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px;">
            Shortener navigation confirmed! Reward claimed.
        </p>

        <div id="reward-box" style="background: rgba(0, 242, 254, 0.1); border: 1px solid #00f2fe; border-radius: 14px; padding: 15px; margin-bottom: 20px;">
            <div style="font-size: 1.5rem; font-weight: 800; color: #ffd700;" id="reward-text">
                <i class="fa-solid fa-gem"></i> +5 DIAMONDS
            </div>
            <div style="font-size: 0.8rem; color: #00f2fe; margin-top: 4px;">
                <span id="verify-uid">Syncing...</span>
            </div>
        </div>

        <button onclick="window.location.href='index.html'" class="btn-primary" style="width: 100%;">
            <i class="fa-solid fa-house"></i> RETURN TO DASHBOARD
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQocUJB6rMG-1qHVyXwXDoYBlTb17XX3k",
            authDomain: "clashfirediamond.firebaseapp.com",
            projectId: "clashfirediamond",
            storageBucket: "clashfirediamond.firebasestorage.app",
            messagingSenderId: "901946161853",
            appId: "1:901946161853:web:03f9a4be00070134c0d5d4",
            measurementId: "G-N31S9SDP2L"
        };

        async function processVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const taskIdx = parseInt(urlParams.get('task') || '0');
            let deviceId = localStorage.getItem('CLASH_FIRE_HW_ID');

            if (deviceId) {
                const displayUserId = "User ID: CF-" + deviceId.substring(9, 15);
                document.getElementById('verify-uid').innerText = displayUserId;
            }

            let activeToken = localStorage.getItem("ACTIVE_TOKEN_" + taskIdx);
            if (!activeToken) {
                showSecurityError("DIRECT LINK ACCESS BLOCKED!", "You cannot paste or bookmark this URL directly. Launch task from Clash Fire app.");
                return;
            }
            localStorage.removeItem("ACTIVE_TOKEN_" + taskIdx);

            let rewardAmt = 5;

            try {
                if (typeof firebase !== 'undefined') {
                    firebase.initializeApp(firebaseConfig);
                    const db = firebase.firestore();

                    // Load dynamic settings
                    const settingsDoc = await db.collection("settings").doc("global").get();
                    if (settingsDoc.exists) {
                        rewardAmt = settingsDoc.data().linkReward || 5;
                    }
                    document.getElementById('reward-text').innerHTML = `<i class="fa-solid fa-gem"></i> +${rewardAmt} DIAMONDS`;

                    if (deviceId) {
                        const userRef = db.collection("users").doc(deviceId);
                        const doc = await userRef.get();
                        
                        if (doc.exists) {
                            let data = doc.data();
                            if (!data.completedLinks[taskIdx]) {
                                data.completedLinks[taskIdx] = true;
                                data.dailyLinkCompletedCount = (data.dailyLinkCompletedCount || 0) + 1;
                                data.coins = (data.coins || 0) + rewardAmt;
                                await userRef.update(data);
                            }
                        }
                    }
                }
            } catch(e) { console.error(e); }

            if (deviceId) {
                let localData = localStorage.getItem('CLASH_USER_DATA_' + deviceId);
                if (localData) {
                    let u = JSON.parse(localData);
                    if (!u.completedLinks[taskIdx]) {
                        u.completedLinks[taskIdx] = true;
                        u.dailyLinkCompletedCount = (u.dailyLinkCompletedCount || 0) + 1;
                        u.coins = (u.coins || 0) + rewardAmt;
                        localStorage.setItem('CLASH_USER_DATA_' + deviceId, JSON.stringify(u));
                    }
                }
            }
        }

        function showSecurityError(title, msg) {
            document.getElementById('verify-card').style.borderColor = "#ff1744";
            document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-shield-cat" style="color: #ff1744;"></i>';
            document.getElementById('status-title').innerHTML = `<span style="color: #ff1744;">${title}</span>`;
            document.getElementById('status-desc').innerText = msg;
            document.getElementById('reward-box').style.display = "none";
        }

        window.addEventListener('DOMContentLoaded', processVerification);
    </script>
</body>
</html>
