<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Open Graph -->
    <meta property="og:type" content="website">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FFire.xyz">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(18, 20, 32, 0.95);
            --primary-fire: #ff4500;
            --accent-gold: #ffd700;
            --accent-cyan: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 30%, rgba(0, 242, 254, 0.15) 0%, transparent 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }
        .icon-box { font-size: 3.5rem; color: var(--accent-cyan); margin-bottom: 15px; }
        .spin { animation: spin 1.5s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }
        .reward-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 215, 0, 0.15); border: 1px solid var(--accent-gold);
            color: var(--accent-gold); padding: 8px 16px; border-radius: 20px;
            font-weight: 800; font-size: 1.1rem; margin-bottom: 20px;
        }
        .timer-box {
            width: 90px; height: 90px; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--accent-cyan);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; font-weight: 800; color: var(--accent-cyan);
            margin: 20px 0; animation: spin 2s infinite linear;
        }
        .timer-box span {
            animation: keep-upright 2s infinite linear;
            display: inline-block;
        }
        @keyframes keep-upright {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
        .btn-return {
            background: linear-gradient(135deg, var(--accent-cyan), #00a8ff);
            color: #000; border: none; padding: 14px; border-radius: 12px;
            font-weight: 800; font-size: 1rem; cursor: pointer; width: 320px; max-width: 100%;
            display: none; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            text-align: center; margin-top: 15px;
        }
        .btn-verify-task {
            background: linear-gradient(135deg, #00e676, #00c853);
            color: #000; border: none; padding: 14px; border-radius: 12px;
            font-weight: 800; font-size: 1rem; cursor: pointer; width: 320px; max-width: 100%;
            display: none; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
            text-align: center; margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Header / Top Banner Ad Slot -->
    <div id="ad-slot-header" style="width: 100%; max-width: 728px; margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; min-height: 90px; overflow: hidden;"></div>

    <div class="icon-box" id="status-icon"><i class="fa-solid fa-spinner spin"></i></div>
    <h2 id="status-title">VERIFYING MISSION...</h2>
    <p id="status-desc">Validating task completion with anti-cheat servers.</p>
    
    <!-- Premium Countdown Timer Box -->
    <div class="timer-box" id="timer-box-element" style="display: none;">
        <span id="countdown-val-node">20</span>
    </div>

    <div class="reward-badge"><img src="https://ffire.xyz/diamond.png" alt="Diamond" style="width: 24px; height: 24px; object-fit: contain;"> <span id="reward-amt">+5 Diamonds</span></div>
    
    <!-- Verification Action Button -->
    <button class="btn-verify-task" id="btn-verify-action" onclick="executeVerificationAndReward()">VERIFY MISSION</button>
    
    <a href="https://ffire.xyz/index.html" class="btn-return" id="return-btn">RETURN TO DASHBOARD</a>

    <!-- Footer / Bottom Banner Ad Slot -->
    <div id="ad-slot-footer" style="width: 100%; max-width: 728px; margin: 20px auto 0 auto; display: flex; justify-content: center; align-items: center; min-height: 90px; overflow: hidden;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQocUJB6rMG-1qHVyXwXDoYBlTb17XX3k",
            authDomain: "clashfirediamond.firebaseapp.com",
            projectId: "clashfirediamond",
            storageBucket: "clashfirediamond.firebasestorage.app",
            messagingSenderId: "901946161853",
            appId: "1:901946161853:web:03f9a4be00070134c0d5d4",
            measurementId: "G-N31S9SDP2L"
        };

        let db = null;
        try {
            if (typeof firebase !== 'undefined' && firebase.initializeApp) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            }
        } catch(e){}

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i];
                while (c.charAt(0)==' ') c = c.substring(1,c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
            }
            return null;
        }

        let rewardAmt = 5;
        let taskId = 1;
        let deviceId = "";
        let userData = null;
        let countdownInterval = null;
        let timeLeft = 20;

        // Dynamic helper to inject raw script codes safely
        // Dynamic helper to inject raw script codes inside a clean dynamic iframe context
        function injectAdScript(elementId, scriptHtml) {
            const container = document.getElementById(elementId);
            if (!container || !scriptHtml) return;
            
            container.innerHTML = '';
            
            // Create a borderless, transparent styled iframe
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '270px'; // Supports standard sizes like 300x250 native banner easily
            iframe.style.border = 'none';
            iframe.style.margin = '0 auto';
            iframe.style.display = 'block';
            iframe.style.overflow = 'hidden';
            iframe.setAttribute('scrolling', 'no');
            
            container.appendChild(iframe);
            
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <style>
                            body { 
                                margin: 0; padding: 0; 
                                display: flex; justify-content: center; align-items: center; 
                                background: transparent; overflow: hidden; 
                            }
                        </style>
                    </head>
                    <body>
                        ${scriptHtml}
                    </body>
                    </html>
                `);
                doc.close();
            } catch (err) {
                console.error("Ad slot injection failed: ", err);
            }
        }

        async function verifyAndReward() {
            const urlParams = new URLSearchParams(window.location.search);
            taskId = parseInt(urlParams.get('task') || '1'); // 1-based task ID

            deviceId = getCookie('CLASH_PERMANENT_HW_ID') || localStorage.getItem('CLASH_FIRE_HW_ID');
            if (!deviceId) {
                document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-circle-xmark" style="color:#ff1744;"></i>';
                document.getElementById('status-title').innerText = 'SESSION EXPIRED';
                document.getElementById('status-desc').innerText = 'Please open FFire.xyz dashboard first!';
                document.getElementById('return-btn').style.display = 'block';
                return;
            }

            // 🛡️ STRICT SECURITY CHECK: Validate One-Time Active Token
            const tokenRaw = localStorage.getItem("CF_ACTIVE_TOKEN_TASK_" + taskId);
            if (!tokenRaw) {
                document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:#ff1744;"></i>';
                document.getElementById('status-title').innerText = 'SECURITY VIOLATION!';
                document.getElementById('status-desc').innerText = 'Direct URL opening or link sharing detected! Task was not launched from FFire.xyz app.';
                document.getElementById('reward-amt').innerText = '0 Diamonds';
                document.getElementById('return-btn').style.display = 'block';
                return;
            }

            try {
                const tokenData = JSON.parse(tokenRaw);
                const elapsedMins = (Date.now() - tokenData.time) / (1000 * 60);
                if (elapsedMins > 15) { // Expire token after 15 mins
                    localStorage.removeItem("CF_ACTIVE_TOKEN_TASK_" + taskId);
                    document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-clock" style="color:#ff1744;"></i>';
                    document.getElementById('status-title').innerText = 'SESSION TIMEOUT!';
                    document.getElementById('status-desc').innerText = 'Mission verification session expired (15 mins limit). Please relaunch from app.';
                    document.getElementById('reward-amt').innerText = '0 Diamonds';
                    document.getElementById('return-btn').style.display = 'block';
                    return;
                }
            } catch(e) {
                localStorage.removeItem("CF_ACTIVE_TOKEN_TASK_" + taskId);
                document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-shield-cat" style="color:#ff1744;"></i>';
                document.getElementById('status-title').innerText = 'INVALID TOKEN!';
                document.getElementById('status-desc').innerText = 'Security token tampered or corrupted.';
                document.getElementById('return-btn').style.display = 'block';
                return;
            }

            // Fetch dynamic configurations & Ad codes from settings/global
            let adHeaderCode = '';
            let adFooterCode = '';
            let adPopunderCode = '';

            if (db) {
                try {
                    const gDoc = await db.collection("settings").doc("global").get();
                    if (gDoc.exists) {
                        const gData = gDoc.data();
                        if (gData.linkReward) rewardAmt = gData.linkReward;
                        if (gData.verifyTimerSeconds !== undefined) {
                            timeLeft = parseInt(gData.verifyTimerSeconds);
                        }
                        adHeaderCode = gData.adScriptHeader || '';
                        adFooterCode = gData.adScriptFooter || '';
                        adPopunderCode = gData.adScriptPopunder || '';
                    }
                } catch(e){}
            }

            document.getElementById('reward-amt').innerText = `+${rewardAmt} Diamonds`;

            // Inject Ads dynamically
            if (adHeaderCode) injectAdScript('ad-slot-header', adHeaderCode);
            if (adFooterCode) injectAdScript('ad-slot-footer', adFooterCode);
            if (adPopunderCode) {
                // If it is a smartlink url, open it or inject as script block
                if (adPopunderCode.startsWith('http')) {
                    // Try to trigger popunder safely on first click or countdown
                    window.addEventListener('click', () => {
                        if (!window.popunderTriggered) {
                            window.open(adPopunderCode, '_blank');
                            window.popunderTriggered = true;
                        }
                    }, { once: true });
                } else {
                    injectAdScript('ad-slot-header', adPopunderCode); // Embed code script inline
                }
            }

            // Start Premium Verification Countdown Timer
            document.getElementById('countdown-val-node').innerText = timeLeft;
            document.getElementById('status-icon').style.display = 'none';
            document.getElementById('timer-box-element').style.display = 'flex';
            document.getElementById('status-title').innerText = 'UNLOCKING REWARD...';
            document.getElementById('status-desc').innerText = 'Please stay on this page. Verifying mission activity with anti-cheat servers...';

            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown-val-node').innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;

                    // Enable claim/verify step state
                    document.getElementById('timer-box-element').style.display = 'none';
                    document.getElementById('status-icon').style.display = 'block';
                    document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-circle-check" style="color:#00e676;"></i>';
                    document.getElementById('status-title').innerText = 'VERIFICATION READY!';
                    document.getElementById('status-desc').innerText = 'Security checks passed! Click the green button below to claim your reward.';
                    document.getElementById('btn-verify-action').style.display = 'block';
                }
            }, 1000);
        }

        async function executeVerificationAndReward() {
            // Hide the button to prevent double claim click spamming
            document.getElementById('btn-verify-action').style.display = 'none';
            document.getElementById('status-title').innerText = 'CREDITING WALLET...';

            let userData = null;
            const saved = localStorage.getItem('CLASH_USER_DATA_' + deviceId);
            if (saved) userData = JSON.parse(saved);

            if (db) {
                try {
                    const docRef = db.collection("users").doc(deviceId);
                    const doc = await docRef.get();
                    if (doc.exists) {
                        userData = doc.data();
                    }
                } catch(e){}
            }

            if (!userData) {
                userData = { coins: 0, completedLinks: {}, dailyLinkCompletedCount: 0 };
            }

            if (!userData.completedLinks || Array.isArray(userData.completedLinks)) {
                userData.completedLinks = {};
            }

            if (userData.completedLinks[taskId]) {
                // Burn token
                localStorage.removeItem("CF_ACTIVE_TOKEN_TASK_" + taskId);
                document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color:#ffd700;"></i>';
                document.getElementById('status-title').innerText = 'ALREADY CLAIMED!';
                document.getElementById('status-desc').innerText = 'You have already claimed reward for this mission today.';
                document.getElementById('return-btn').style.display = 'block';
                return;
            }

            // Credit Reward & Burn One-Time Token!
            localStorage.removeItem("CF_ACTIVE_TOKEN_TASK_" + taskId);
            userData.completedLinks[taskId] = true;
            userData.coins = (userData.coins || 0) + rewardAmt;
            userData.dailyLinkCompletedCount = (userData.dailyLinkCompletedCount || 0) + 1;

            localStorage.setItem('CLASH_USER_DATA_' + deviceId, JSON.stringify(userData));

            if (db) {
                try {
                    // 1. Save user profile updates
                    await db.collection("users").doc(deviceId).set(userData, { merge: true });

                    // 2. Process Referral Daily Mission Commission (Triggered ONLY when ALL tasks are completed)
                    if (userData.referredBy) {
                        const refCode = userData.referredBy;
                        
                        // Fetch dynamic database links configuration to check count limits
                        let totalRequiredMissions = 5;
                        try {
                            const linksDoc = await db.collection("settings").doc("links").get();
                            if (linksDoc.exists && linksDoc.data().items && Array.isArray(linksDoc.data().items)) {
                                totalRequiredMissions = linksDoc.data().items.length;
                            }
                        } catch(le){}

                        // Count successfully completed missions for today
                        const completedCount = Object.keys(userData.completedLinks || {}).length;

                        if (completedCount >= totalRequiredMissions) {
                            // Anti-Double Commission Check: Check if commission was already processed for today's reset
                            const todayResetKey = new Date().toISOString().split('T')[0];
                            if (userData.lastReferralCommissionDate !== todayResetKey) {
                                
                                // Fetch settings/global to get the current referralCommissionPercent
                                let commPercent = 10;
                                try {
                                    const gSettingsDoc = await db.collection("settings").doc("global").get();
                                    if (gSettingsDoc.exists && gSettingsDoc.data().referralCommissionPercent !== undefined) {
                                        commPercent = parseInt(gSettingsDoc.data().referralCommissionPercent);
                                    }
                                } catch(se){}

                                // Calculate overall mission rewards summation (e.g. 5 tasks * 5 coins = 25 total reward)
                                const totalDailyMissionsReward = totalRequiredMissions * rewardAmt;
                                const commissionCoins = parseFloat((totalDailyMissionsReward * (commPercent / 100)).toFixed(2));

                                if (commissionCoins > 0) {
                                    // Fetch all users to find the referrer matching this display ID
                                    const snapshot = await db.collection("users").get();
                                    for (const doc of snapshot.docs) {
                                        const displayId = "CF-" + doc.id.substring(9, 15);
                                        if (displayId === refCode && doc.id !== deviceId) {
                                            const refData = doc.data();
                                            const newCoins = parseFloat(((refData.coins || 0) + commissionCoins).toFixed(2));
                                            
                                            await doc.ref.update({
                                                coins: newCoins
                                            });

                                            // Log commission date to prevent repeat triggers today
                                            await db.collection("users").doc(deviceId).update({
                                                lastReferralCommissionDate: todayResetKey
                                            });
                                            console.log(`Referral commission of +${commissionCoins} credited to referrer ${displayId} (All ${completedCount}/${totalRequiredMissions} missions completed today).`);
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                    }
                } catch(e){ console.error("Verify save err:", e); }
            }

            document.getElementById('status-icon').innerHTML = '<i class="fa-solid fa-circle-check" style="color:#00e676;"></i>';
            document.getElementById('status-title').innerText = 'MISSION COMPLETED!';
            document.getElementById('status-desc').innerText = `Congratulations! +${rewardAmt} Diamonds credited to your account.`;
            document.getElementById('return-btn').style.display = 'block';
        }

        window.addEventListener('DOMContentLoaded', verifyAndReward);
    </script>
</body>
</html>
